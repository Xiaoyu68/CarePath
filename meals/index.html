<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>每周健身餐 · AI 菜谱与买菜清单</title>
<meta name="description" content="给健身人士的 AI 每周餐单工具：按增肌/减脂目标一键生成一周三餐，自动汇总成可勾选、可打印的买菜清单。" />
<style>
  :root {
    --ink: #18212f;
    --muted: #647084;
    --line: #d9e0ea;
    --panel: #ffffff;
    --soft: #f5f7fa;
    --soft-2: #eef5f1;
    --accent: #0f766e;
    --accent-2: #b45309;
    --danger: #b42318;
    --blue: #2563eb;
    --green: #16845b;
    --shadow: 0 14px 36px rgba(24, 33, 47, .10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    background: linear-gradient(180deg, #f7faf9 0%, #f4f6f9 100%);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 980px; margin: 0 auto; padding: 24px 18px 80px; }
  header.top { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  .logo { font-weight: 800; font-size: 20px; letter-spacing: .5px; color: var(--accent); }
  .logo span { color: var(--ink); font-weight: 700; }
  .home-link { margin-left: auto; font-size: 13px; color: var(--muted); text-decoration: none; }
  .home-link:hover { color: var(--accent); }
  h1 { font-size: 26px; margin: 10px 0 4px; }
  .sub { color: var(--muted); margin: 0 0 22px; font-size: 15px; }

  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); padding: 20px; margin-bottom: 18px; }
  .card h2 { font-size: 17px; margin: 0 0 14px; display: flex; align-items: center; gap: 8px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 13px; font-weight: 600; color: var(--ink); }
  .field .hint { font-size: 12px; color: var(--muted); font-weight: 400; }
  input, select, textarea {
    font: inherit; padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px; background: #fff; color: var(--ink); width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: 2px solid rgba(15,118,110,.25); border-color: var(--accent); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { border: 1px solid var(--line); background: #fff; border-radius: 999px; padding: 6px 13px; font-size: 13px; cursor: pointer; user-select: none; color: var(--muted); }
  .chip.on { background: var(--soft-2); border-color: var(--accent); color: var(--accent); font-weight: 600; }

  .btn { border: 0; border-radius: 10px; padding: 12px 22px; font-size: 15px; font-weight: 700; cursor: pointer; transition: .15s; }
  .btn.primary { background: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(15,118,110,.3); }
  .btn.primary:hover { filter: brightness(1.06); }
  .btn.primary:disabled { opacity: .55; cursor: not-allowed; box-shadow: none; }
  .btn.ghost { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  .btn.ghost:hover { background: var(--soft); }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  .note-box { font-size: 13px; color: var(--muted); background: var(--soft); border-radius: 10px; padding: 12px 14px; border-left: 3px solid var(--accent); }

  .tag { display: inline-block; font-size: 12px; padding: 2px 9px; border-radius: 999px; background: var(--soft-2); color: var(--accent); font-weight: 600; }
  .tag.amber { background: #fff7ec; color: var(--accent-2); }

  /* meal plan */
  .day { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
  .day-head { background: var(--soft-2); padding: 10px 14px; font-weight: 700; font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
  .day-head .kcal { font-size: 12px; color: var(--muted); font-weight: 600; }
  .meal { display: flex; gap: 12px; padding: 11px 14px; border-top: 1px solid var(--line); align-items: flex-start; }
  .meal:first-child { border-top: 0; }
  .meal input[type=checkbox] { width: 18px; height: 18px; margin-top: 3px; flex: 0 0 auto; accent-color: var(--accent); }
  .meal-body { flex: 1; }
  .meal-slot { font-size: 12px; color: var(--accent); font-weight: 700; }
  .meal-title { font-weight: 600; }
  .meal-detail { font-size: 13px; color: var(--muted); }
  .meal.done .meal-title, .meal.done .meal-detail { text-decoration: line-through; opacity: .55; }

  /* shopping */
  .shop-cat { margin-bottom: 14px; }
  .shop-cat h3 { font-size: 14px; margin: 0 0 8px; color: var(--accent); }
  .shop-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px; }
  .shop-item { display: flex; gap: 9px; align-items: center; font-size: 14px; padding: 5px 8px; border-radius: 8px; }
  .shop-item:hover { background: var(--soft); }
  .shop-item input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--accent); flex: 0 0 auto; }
  .shop-item .amt { color: var(--muted); font-size: 13px; }
  .shop-item.done label { text-decoration: line-through; opacity: .5; }

  .tips li { font-size: 14px; margin-bottom: 6px; }

  .loading { text-align: center; padding: 40px 20px; color: var(--muted); }
  .spinner { width: 34px; height: 34px; border: 3px solid var(--line); border-top-color: var(--accent); border-radius: 50%; margin: 0 auto 14px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err-box { background: #fef2f2; border: 1px solid #f3c9c4; border-radius: 10px; padding: 14px; color: var(--danger); font-size: 14px; }

  .hidden { display: none !important; }
  .foot { text-align: center; color: var(--muted); font-size: 12px; margin-top: 30px; }
  .foot a { color: var(--muted); }

  /* 账号条 */
  .auth-bar { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .auth-bar .who { color: var(--ink); font-weight: 600; }
  .auth-bar .cloud { color: var(--green); font-size: 12px; }
  .auth-bar button { font: inherit; font-size: 13px; border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 8px; padding: 5px 12px; cursor: pointer; }
  .auth-bar button.solid { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .auth-bar button:hover { filter: brightness(.98); }

  /* 模态框 */
  .overlay { position: fixed; inset: 0; background: rgba(24,33,47,.45); display: none; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; box-shadow: var(--shadow); width: 100%; max-width: 360px; padding: 22px; }
  .modal h3 { margin: 0 0 4px; font-size: 18px; }
  .modal p.tip { margin: 0 0 16px; color: var(--muted); font-size: 13px; }
  .modal .field { margin-bottom: 12px; }
  .modal .msg { font-size: 13px; min-height: 18px; margin: 4px 0 12px; }
  .modal .msg.err { color: var(--danger); }
  .modal .msg.ok { color: var(--green); }
  .modal .row { display: flex; gap: 10px; }
  .modal .row .btn { flex: 1; }
  .modal .switch { text-align: center; margin-top: 14px; font-size: 13px; color: var(--muted); }
  .modal .switch a { color: var(--accent); cursor: pointer; font-weight: 600; }
  .modal .close { float: right; border: 0; background: transparent; font-size: 20px; color: var(--muted); cursor: pointer; line-height: 1; }

  @media print {
    body { background: #fff; }
    .no-print { display: none !important; }
    .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
    .shop-item:hover { background: transparent; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="logo">FitMeal <span>· 每周健身餐</span></div>
    <span class="auth-bar no-print" id="authBar"></span>
    <a class="home-link" href="/">← 回主站</a>
  </header>
  <h1>AI 每周健身餐与买菜清单</h1>
  <p class="sub">填几项目标和情况，AI 按你的增肌/减脂需求排好一周三餐，再自动汇总成一张可勾选、可打印的买菜清单 —— 照着买、照着吃就行。</p>

  <!-- ============ 输入卡 ============ -->
  <section class="card no-print" id="formCard">
    <h2>① 你的目标和情况</h2>

    <div class="grid">
      <div class="field">
        <label>目标</label>
        <select id="f_goal">
          <option>减脂</option>
          <option>增肌</option>
          <option>维持体型、吃得健康</option>
        </select>
      </div>
      <div class="field">
        <label>性别</label>
        <select id="f_sex">
          <option value="">不填</option>
          <option>男</option>
          <option>女</option>
        </select>
      </div>
      <div class="field">
        <label>体重 <span class="hint">公斤，用来估蛋白质</span></label>
        <input id="f_weight" type="number" min="30" max="200" placeholder="如 65" />
      </div>
      <div class="field">
        <label>身高 <span class="hint">厘米，选填</span></label>
        <input id="f_height" type="number" min="120" max="220" placeholder="如 172" />
      </div>
      <div class="field">
        <label>每天热量目标 <span class="hint">不填 AI 帮你估</span></label>
        <input id="f_kcal" type="number" min="800" max="5000" placeholder="如 1800（千卡）" />
      </div>
      <div class="field">
        <label>训练强度</label>
        <select id="f_train">
          <option>每周练 3 次以内</option>
          <option>每周练 4-5 次</option>
          <option>几乎天天练 / 大重量</option>
        </select>
      </div>
    </div>

    <div style="margin:16px 0 6px"><label style="font-size:13px;font-weight:600">口味偏好（可多选）</label></div>
    <div class="chips" id="f_taste">
      <span class="chip" data-v="清淡少油">清淡少油</span>
      <span class="chip" data-v="要有味道、别太寡淡">重口一点</span>
      <span class="chip" data-v="偏好中式家常">中式家常</span>
      <span class="chip" data-v="能接受西式、沙拉、轻食">西式/轻食</span>
      <span class="chip" data-v="爱吃辣">能吃辣</span>
      <span class="chip" data-v="高蛋白优先">高蛋白优先</span>
    </div>

    <!-- 公共字段 -->
    <div class="grid" style="margin-top:16px">
      <div class="field">
        <label>做几个人的饭</label>
        <select id="c_people">
          <option value="1" selected>1 人</option>
          <option value="2">2 人</option>
          <option value="3">3 人</option>
          <option value="4">4 人及以上</option>
        </select>
      </div>
      <div class="field">
        <label>做饭方便程度</label>
        <select id="c_effort">
          <option>简单为主，别太费时间</option>
          <option>正常，愿意花点功夫</option>
          <option>怎么有营养怎么来</option>
        </select>
      </div>
      <div class="field">
        <label>预算 <span class="hint">选填</span></label>
        <select id="c_budget">
          <option value="">不限</option>
          <option>尽量省钱</option>
          <option>适中</option>
          <option>不太在意价格</option>
        </select>
      </div>
    </div>

    <div class="grid" style="margin-top:14px">
      <div class="field">
        <label>忌口 / 过敏 / 不吃的东西</label>
        <input id="c_avoid" placeholder="如：不吃牛羊肉、海鲜过敏、不吃香菜" />
      </div>
      <div class="field">
        <label>还有什么想说的</label>
        <input id="c_extra" placeholder="如：只有电饭煲和微波炉、中午带饭" />
      </div>
    </div>

    <div class="actions" style="margin-top:18px">
      <button class="btn primary" id="genBtn">🍳 生成本周健身餐</button>
      <span class="note-box" style="border:0;background:transparent;padding:0;font-size:12px">AI 生成内容仅供参考，请结合自身情况调整</span>
    </div>
  </section>

  <!-- ============ 结果 ============ -->
  <section id="resultArea"></section>

  <p class="foot no-print">
    FitMeal · AI 生成的饮食建议仅供参考，特殊健康状况请咨询专业人士 · <a href="/">返回主站</a>
  </p>
</div>

<!-- 登录/注册模态框 -->
<div class="overlay no-print" id="authOverlay">
  <div class="modal">
    <button class="close" id="authClose" aria-label="关闭">×</button>
    <h3 id="authTitle">登录</h3>
    <p class="tip" id="authTip">登录后，你生成的菜单会存到云端，换手机、换浏览器也能看到。</p>
    <div class="field">
      <label>用户名 <span class="hint">3-20 位字母/数字/下划线</span></label>
      <input id="authUser" autocomplete="username" placeholder="给自己起个名字" />
    </div>
    <div class="field">
      <label>密码 <span class="hint">至少 6 位</span></label>
      <input id="authPass" type="password" autocomplete="current-password" placeholder="••••••" />
    </div>
    <div class="msg" id="authMsg"></div>
    <div class="row">
      <button class="btn primary" id="authSubmit">登录</button>
    </div>
    <div class="switch" id="authSwitch">还没有账号？<a id="authToggle">注册一个</a></div>
  </div>
</div>

<script>
"use strict";
const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));
const STORE_KEY = "fitmeal_v1";

/* ===================== 账号 + 云端存储 ===================== */
let user = null;          // 当前登录用户名，未登录为 null
let currentPlan = null;   // 当前展示的菜单，供云端保存使用
let cloudSaveTimer = null;

async function account(action, payload) {
  const res = await fetch("/api/account", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action, ...(payload || {}) }),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
  return data;
}

async function cloudLoad() {
  const res = await fetch("/api/meals-data");
  if (res.status === 401) { user = null; return null; }
  if (!res.ok) return null;
  return res.json().catch(() => null);
}

function cloudSave(plan, checks) {
  if (!user || !plan) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(() => {
    fetch("/api/meals-data", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ plan, checks }),
    }).catch(() => {});
  }, 400);
}

function renderAuthBar() {
  const bar = $("#authBar");
  if (user) {
    bar.innerHTML = `<span class="who">👤 ${esc(user)}</span><span class="cloud">☁️ 云端已开</span><button id="logoutBtn">退出</button>`;
    $("#logoutBtn").addEventListener("click", async () => {
      try { await account("logout"); } catch {}
      user = null;
      renderAuthBar();
    });
  } else {
    bar.innerHTML = `<button class="solid" id="loginBtn">登录 / 注册</button>`;
    $("#loginBtn").addEventListener("click", () => openAuth("login"));
  }
}

/* ---------- 模态框 ---------- */
let authMode = "login";
function openAuth(modeWanted) {
  authMode = modeWanted || "login";
  applyAuthMode();
  $("#authMsg").textContent = "";
  $("#authMsg").className = "msg";
  $("#authOverlay").classList.add("open");
  $("#authUser").focus();
}
function closeAuth() { $("#authOverlay").classList.remove("open"); }
function applyAuthMode() {
  const reg = authMode === "register";
  $("#authTitle").textContent = reg ? "注册" : "登录";
  $("#authSubmit").textContent = reg ? "注册并登录" : "登录";
  $("#authSwitch").innerHTML = reg
    ? `已有账号？<a id="authToggle">去登录</a>`
    : `还没有账号？<a id="authToggle">注册一个</a>`;
  $("#authToggle").addEventListener("click", () => { authMode = reg ? "login" : "register"; applyAuthMode(); $("#authMsg").textContent = ""; });
}
async function submitAuth() {
  const username = $("#authUser").value.trim();
  const password = $("#authPass").value;
  const msg = $("#authMsg");
  msg.className = "msg";
  msg.textContent = "处理中……";
  $("#authSubmit").disabled = true;
  try {
    const data = await account(authMode, { username, password });
    user = data.user;
    msg.className = "msg ok";
    msg.textContent = authMode === "register" ? "注册成功，已登录" : "登录成功";
    renderAuthBar();
    // 登录后：把云端菜单取回来；没有云端但本地有，就把本地的推上去
    const cloud = await cloudLoad();
    if (cloud && cloud.plan) {
      saveStore({ plan: cloud.plan, checks: cloud.checks || {} });
      render(cloud.plan, cloud.checks || {});
    } else {
      const local = loadStore();
      if (local && local.plan) cloudSave(local.plan, local.checks || {});
    }
    setTimeout(closeAuth, 500);
  } catch (err) {
    msg.className = "msg err";
    msg.textContent = err.message;
  } finally {
    $("#authSubmit").disabled = false;
  }
}
$("#authClose").addEventListener("click", closeAuth);
$("#authOverlay").addEventListener("click", e => { if (e.target === $("#authOverlay")) closeAuth(); });
$("#authSubmit").addEventListener("click", submitAuth);
$("#authPass").addEventListener("keydown", e => { if (e.key === "Enter") submitAuth(); });


/* ---------- 多选 chips ---------- */
$$("#f_taste .chip").forEach(c => c.addEventListener("click", () => c.classList.toggle("on")));

/* ---------- 收集输入 ---------- */
function collectProfile() {
  const taste = $$("#f_taste .chip.on").map(c => c.dataset.v);
  return {
    目标: $("#f_goal").value,
    性别: $("#f_sex").value || "未填",
    体重公斤: $("#f_weight").value || "未填",
    身高厘米: $("#f_height").value || "未填",
    每日热量目标: $("#f_kcal").value ? $("#f_kcal").value + " 千卡" : "由你估算",
    训练强度: $("#f_train").value,
    口味偏好: taste.length ? taste.join("、") : "不挑",
    人数: $("#c_people").value,
    做饭精力: $("#c_effort").value,
    预算: $("#c_budget").value || "不限",
    忌口过敏: $("#c_avoid").value.trim() || "无",
    补充说明: $("#c_extra").value.trim() || "无",
  };
}

/* ---------- Prompt ---------- */
function buildMessages(profile) {
  const schema = `严格只输出 JSON，结构如下（不要任何额外文字、不要 markdown 代码块）：
{
  "summary": "两三句话说清楚：你怎么按这个人的身高体重性别训练量算出每日热量和蛋白目标的，以及本周这么排的思路，大白话",
  "days": [
    { "day": "周一", "kcal": "约1800千卡 · 蛋白约130克",
      "meals": [
        { "slot": "早餐", "title": "菜名", "detail": "份量(克)+简单做法，一两句大白话" },
        { "slot": "午餐", "title": "...", "detail": "..." },
        { "slot": "晚餐", "title": "...", "detail": "..." },
        { "slot": "加餐", "title": "...", "detail": "..." }
      ]
    }
    // ……一直到周日，共 7 天
  ],
  "shopping": [
    { "category": "蔬菜水果", "items": [ { "name": "西兰花", "amount": "500克" } ] },
    { "category": "肉蛋奶", "items": [] },
    { "category": "主食粮油", "items": [] },
    { "category": "调料其他", "items": [] }
  ],
  "tips": ["3-5 条本周吃饭/采购/备餐的小提示，大白话"]
}`;

  const rules = `要求：
- 先算账、再排餐：先根据性别、体重、身高、训练强度估出这个人的每日大致热量需求(TDEE)；再按目标调整——减脂减约 300-500 千卡、增肌加约 200-400 千卡、维持不变。蛋白质按每公斤体重 1.6-2.2 克（减脂偏高端、维持偏低端）。把这套算账逻辑用大白话写进 summary，并让每天的 kcal/蛋白和它对得上。用户若自己填了每日热量目标，以用户的为准。
- 真按这个人来：训练日多给碳水、休息日减一点；口味偏好、预算、人数、做饭精力都要实打实体现在选材和做法上，不要给一份谁填都一样的通用模板。
- 用户的"忌口过敏"和"补充说明"是最高优先级的硬要求，必须照办，哪怕和上面的默认做法冲突也以用户为准。特别注意：用户若说"样数少一点 / 不想买太多种菜 / 批量备餐 / 怕麻烦"，就大胆让同一道菜连吃好几顿好几天，把主菜控制在很少的几样，买菜清单按批量给总量——别硬凑成每天都不重样。没这类要求时再正常换花样、别七天顿顿一个菜。
- 食材常见好买好做，份量写清楚（克数或常见单位），方便备餐(meal prep)。
- 把一周所有食材合并汇总进买菜清单，同种合并、给一周总量。
- 不做医疗承诺，不针对疾病。`;

  const sys = `你是一位务实的健身餐 / 体型管理饮食教练。\n你的任务：根据用户情况，生成"一周 7 天"的三餐（含加餐）菜单，并把所有用到的食材汇总成一张按区域分类的买菜清单。\n${rules}\n${schema}`;
  const user = `用户情况：\n${Object.entries(profile).map(([k, v]) => `- ${k}：${v}`).join("\n")}\n\n请生成本周完整餐单和买菜清单。`;
  return [
    { role: "system", content: sys },
    { role: "user", content: user },
  ];
}

/* ---------- 调用 AI（复用主站边缘函数，访客免 key） ---------- */
async function callAI(messages) {
  const res = await fetch("/api/ai/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ temperature: 0.8, response_format: { type: "json_object" }, messages }),
  });
  if (!res.ok) {
    let msg = "HTTP " + res.status;
    try { const e = await res.json(); if (e?.error?.message) msg = e.error.message; } catch {}
    throw new Error(msg);
  }
  const data = await res.json();
  const content = data.choices?.[0]?.message?.content;
  if (!content) throw new Error("AI 返回为空，请重试");
  return parsePlan(content);
}

function parsePlan(content) {
  let txt = content.trim().replace(/^```(?:json)?/i, "").replace(/```$/, "").trim();
  const s = txt.indexOf("{"), e = txt.lastIndexOf("}");
  if (s >= 0 && e > s) txt = txt.slice(s, e + 1);
  const plan = JSON.parse(txt);
  if (!Array.isArray(plan.days) || !Array.isArray(plan.shopping)) throw new Error("AI 返回格式不完整");
  return plan;
}

/* ---------- 渲染 ---------- */
function esc(s) { return String(s == null ? "" : s).replace(/[&<>]/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[m])); }

function render(plan, savedChecks) {
  const checks = savedChecks || {};
  currentPlan = plan;
  const area = $("#resultArea");
  const planHtml = plan.days.map((d, di) => {
    const meals = (d.meals || []).map((m, mi) => {
      const id = "m" + di + "_" + mi;
      const on = checks[id] ? " checked" : "";
      return `<label class="meal${on ? " done" : ""}" data-id="${id}">
        <input type="checkbox"${on}>
        <span class="meal-body">
          <span class="meal-slot">${esc(m.slot)}</span> &nbsp;<span class="meal-title">${esc(m.title)}</span><br>
          <span class="meal-detail">${esc(m.detail)}</span>
        </span></label>`;
    }).join("");
    return `<div class="day">
      <div class="day-head"><span>${esc(d.day)}</span>${d.kcal ? `<span class="kcal">${esc(d.kcal)}</span>` : ""}</div>
      ${meals}</div>`;
  }).join("");

  const shopHtml = plan.shopping.filter(c => c.items && c.items.length).map((c, ci) => {
    const items = c.items.map((it, ii) => {
      const id = "s" + ci + "_" + ii;
      const on = checks[id] ? " checked" : "";
      return `<label class="shop-item${on ? " done" : ""}" data-id="${id}">
        <input type="checkbox"${on}>
        <span>${esc(it.name)} ${it.amount ? `<span class="amt">${esc(it.amount)}</span>` : ""}</span></label>`;
    }).join("");
    return `<div class="shop-cat"><h3>${esc(c.category)}</h3><div class="shop-items">${items}</div></div>`;
  }).join("");

  const tipsHtml = (plan.tips && plan.tips.length)
    ? `<section class="card"><h2>💡 本周小提示</h2><ul class="tips">${plan.tips.map(t => `<li>${esc(t)}</li>`).join("")}</ul></section>`
    : "";

  area.innerHTML = `
    ${plan.summary ? `<div class="note-box no-print" style="margin-bottom:18px">📋 ${esc(plan.summary)}</div>` : ""}
    <section class="card">
      <h2>🛒 这周要买的菜 <span class="tag">勾掉买好的</span></h2>
      ${shopHtml || '<p class="sub">没有汇总到食材。</p>'}
    </section>
    <section class="card">
      <h2>🍱 一周三餐 <span class="tag">吃完一顿勾一顿</span></h2>
      ${planHtml}
    </section>
    ${tipsHtml}
    <div class="actions no-print" style="margin-bottom:8px">
      <button class="btn ghost" onclick="window.print()">🖨️ 打印 / 存为 PDF</button>
      <button class="btn ghost" id="regenBtn">↻ 重新生成</button>
      <button class="btn ghost" id="editBtn">✎ 改条件重做</button>
    </div>`;

  // 勾选状态持久化
  $$(".meal, .shop-item", area).forEach(el => {
    const cb = $("input", el);
    cb.addEventListener("change", () => {
      el.classList.toggle("done", cb.checked);
      const saved = loadStore() || {};
      saved.checks = saved.checks || {};
      saved.checks[el.dataset.id] = cb.checked;
      saveStore(saved);
      cloudSave(currentPlan, saved.checks);
    });
  });

  $("#regenBtn")?.addEventListener("click", () => generate(true));
  $("#editBtn")?.addEventListener("click", () => $("#formCard").scrollIntoView({ behavior: "smooth" }));
  area.scrollIntoView({ behavior: "smooth" });
}

/* ---------- 本地存储 ---------- */
function loadStore() { try { return JSON.parse(localStorage.getItem(STORE_KEY)); } catch { return null; } }
function saveStore(o) { try { localStorage.setItem(STORE_KEY, JSON.stringify(o)); } catch {} }

/* ---------- 主流程 ---------- */
async function generate(resetChecks) {
  const profile = collectProfile();
  const btn = $("#genBtn");
  btn.disabled = true;
  $("#resultArea").innerHTML = `<div class="card"><div class="loading"><div class="spinner"></div>AI 正在排这一周的健身餐和买菜清单，大约 20-40 秒……</div></div>`;
  $("#resultArea").scrollIntoView({ behavior: "smooth" });
  try {
    const plan = await callAI(buildMessages(profile));
    const checks = resetChecks ? {} : (loadStore()?.checks || {});
    saveStore({ plan, checks, ts: Date.now() });
    render(plan, checks);
    cloudSave(plan, checks);
  } catch (err) {
    $("#resultArea").innerHTML = `<div class="card"><div class="err-box">
      😖 生成失败：${esc(err.message)}<br><br>
      可能是网络波动或 AI 暂时繁忙。<button class="btn ghost" onclick="document.getElementById('genBtn').click()">点这里重试</button>
    </div></div>`;
  } finally {
    btn.disabled = false;
  }
}
$("#genBtn").addEventListener("click", () => generate(true));

/* ---------- 恢复上次结果 ---------- */
function showRestored(plan, checks, fromCloud) {
  try {
    render(plan, checks || {});
    const tip = document.createElement("div");
    tip.className = "note-box no-print";
    tip.style.margin = "0 0 14px";
    tip.innerHTML = fromCloud
      ? "☁️ 这是你云端保存的菜单，换设备也能看到。想重做就改上面的条件再点生成。"
      : "👇 下面是你上次生成的菜单（已存在本机）。登录后可同步到云端、换设备也能看。";
    $("#resultArea").prepend(tip);
  } catch {}
}

(async function init() {
  renderAuthBar();
  // 查会话：已登录优先用云端菜单，未登录回退本机
  try {
    const me = await account("me");
    if (me.user) {
      user = me.user;
      renderAuthBar();
      const cloud = await cloudLoad();
      if (cloud && cloud.plan) {
        saveStore({ plan: cloud.plan, checks: cloud.checks || {} });
        showRestored(cloud.plan, cloud.checks || {}, true);
        return;
      }
      // 云端还没有：本机若有就推上去
      const local = loadStore();
      if (local && local.plan) { showRestored(local.plan, local.checks, false); cloudSave(local.plan, local.checks || {}); }
      return;
    }
  } catch {}
  // 未登录：回退本机
  const saved = loadStore();
  if (saved && saved.plan) showRestored(saved.plan, saved.checks, false);
})();
</script>
